<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>python09</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 680px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 2rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #ff7b72);
      border-radius: 16px 16px 0 0;
    }

    .project-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1f6feb, #58a6ff);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 1.8rem;
    }

    .project-name {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #30363d;
      margin: 1.5rem 0;
    }

    .repo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.9rem 1.4rem;
    }

    .repo-icon {
      color: #58a6ff;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .repo-label {
      font-size: 0.8rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
    }

    .repo-name {
      font-size: 1rem;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.01em;
    }

    .repo-separator {
      color: #30363d;
      font-size: 1rem;
    }

    .stats {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      color: #8b949e;
    }

    .stat-pill span.dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }

    .dot-blue   { background-color: #58a6ff; }
    .dot-green  { background-color: #3fb950; }
    .dot-yellow { background-color: #d29922; }

    footer {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.85rem;
      color: #484f58;
      letter-spacing: 0.02em;
    }

    footer span {
      color: #8b949e;
      font-weight: 500;
    }

    footer .heart {
      color: #ff7b72;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="badge">🚀 Active Project</div>

    <div class="card">

      <div class="project-icon">🐍</div>

      <h1 class="project-name">python09</h1>
      <p class="subtitle">A modern Python project built for performance &amp; clarity</p>

      <hr class="divider" />

      <div class="repo-section">
        <svg class="repo-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
        </svg>
        <span class="repo-label">Repo</span>
        <span class="repo-separator">·</span>
        <span class="repo-name">python09</span>
      </div>

      <div class="stats">
        <div class="stat-pill">
          <span class="dot dot-yellow"></span>
          Python
        </div>
        <div class="stat-pill">
          <span class="dot dot-green"></span>
          Open Source
        </div>
        <div class="stat-pill">
          <span class="dot dot-blue"></span>
          v0.9.0
        </div>
      </div>

    </div>

    <footer>
      <span class="heart">♥</span>&nbsp; Developed by <span>Royal Bengal AI</span>
    </footer>

  </div>

</body>
</html>
